<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentorLink - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#0a1f44]">

    <div class="max-w-[1400px] mx-auto flex gap-8 p-8">
        
        <aside class="w-64 shrink-0 flex flex-col h-screen sticky top-8">
            <div class="text-2xl font-bold mb-10 text-blue-700">MentorLink</div>
            <nav class="flex flex-col gap-3">
                <a href="#" class="bg-blue-50 text-blue-700 p-3 rounded-xl font-semibold">Dashboard</a>
                <a href="#" class="text-gray-500 p-3 rounded-xl hover:bg-gray-100">Sessions</a>
                <a href="#" class="text-gray-500 p-3 rounded-xl hover:bg-gray-100">Mentors</a>
                <a href="#" class="text-gray-500 p-3 rounded-xl hover:bg-gray-100">Progression</a>
                <a href="#" class="text-gray-500 p-3 rounded-xl hover:bg-gray-100">Messages</a>
            </nav>
            
            <div class="mt-auto border-t border-gray-100 pt-4">
                <a href="#" class="text-gray-500 p-3 rounded-xl hover:bg-gray-100 block">Help Center</a>
                <a href="#" id="logout-btn" class="text-red-500 p-3 rounded-xl hover:bg-red-50 block font-semibold">Logout</a>
            </div>
        </aside>

        <main class="flex-1">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 id="user-greeting" class="text-4xl font-extrabold">Bonjour...</h1>
                    <p class="text-gray-500 mt-2">Voici un aperçu de votre évolution professionnelle.</p>
                </div>
                <div class="h-12 w-12 rounded-full bg-blue-100 flex items-center justify-center font-bold text-blue-700" id="user-avatar">?</div>
            </header>

            <section class="grid grid-cols-3 gap-6 mb-10">
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <div class="text-3xl font-bold">0</div>
                    <div class="text-gray-500">Sessions suivies</div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <div class="text-3xl font-bold">0</div>
                    <div class="text-gray-500">Heures de mentorat</div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <div class="text-sm font-semibold text-gray-700">Niveau Expert en vue</div>
                    <div class="w-full bg-gray-100 h-2 rounded-full mt-3"><div class="bg-blue-600 h-2 rounded-full w-3/4"></div></div>
                </div>
            </section>

            <section>
                <h2 class="font-bold text-lg mb-4">Mentors recommandés pour vous</h2>
                <div class="grid grid-cols-3 gap-6" id="mentors-container">
                    </div>
            </section>
        </main>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
