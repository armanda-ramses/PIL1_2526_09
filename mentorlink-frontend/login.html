<!DOCTYPE html><html class="light" lang="fr"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>IFRI MentorLink - Inscription</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container": "#eceef0",
                    "on-surface": "#191c1e",
                    "surface-container-lowest": "#ffffff",
                    "on-surface-variant": "#434655",
                    "background": "#f7f9fb",
                    "primary": "#004ac6",
                    "on-primary": "#ffffff",
                    "on-primary-fixed-variant": "#003ea8",
                    "outline-variant": "#c3c6d7",
                    "surface-container-low": "#f2f4f6"
            }
          }
        }
      }
</script>
<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-surface');
        }
        .view-container {
            display: none;
        }
        .view-container.active {
            display: block;
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-surface-container-low font-sans">
<div class="w-full max-w-[500px]">

<div class="view-container active" id="view-login">
    <div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-8 shadow-sm">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-primary mb-2">MentorLink</h1>
            <p class="text-on-surface-variant">Connectez-vous pour continuer.</p>
        </div>
        <form class="space-y-4" onsubmit="event.preventDefault(); alert('Connexion réussie!');">
            <div>
                <label class="block text-sm font-medium mb-1" for="login-email">Email Universitaire</label>
                <input class="w-full border border-outline-variant rounded px-4 py-2 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="login-email" placeholder="etudiant@ifri.edu" type="email" required>
            </div>
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-sm font-medium" for="login-password">Mot de passe</label>
                    <a class="text-sm text-primary hover:underline" href="#">Mot de passe oublié ?</a>
                </div>
                <input class="w-full border border-outline-variant rounded px-4 py-2 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="login-password" placeholder="••••••••" type="password" required>
            </div>
            <button class="w-full bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-semibold py-3 rounded-lg transition-colors mt-6" type="submit">
                Se connecter
            </button>
        </form>
        <div class="mt-6 text-center text-sm text-on-surface-variant border-t border-outline-variant pt-6">
            Nouveau sur MentorLink ? <a class="text-primary font-semibold hover:underline cursor-pointer" onclick="showView('view-register')">Créer un compte</a>
        </div>
    </div>
</div>

<div class="view-container" id="view-register">
    <div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-8 shadow-sm">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-primary mb-2">Créer un compte</h1>
            <p class="text-on-surface-variant">Rejoignez la communauté d'entraide de l'IFRI.</p>
        </div>
        <form class="space-y-4" onsubmit="event.preventDefault(); showView('view-profile');">
            <div>
                <label class="block text-sm font-medium mb-1" for="reg-name">Nom complet</label>
                <input class="w-full border border-outline-variant rounded px-4 py-2 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="reg-name" placeholder="Ex: Yebe Loic" type="text" required>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1" for="reg-email">Email Universitaire</label>
                <input class="w-full border border-outline-variant rounded px-4 py-2 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="reg-email" placeholder="prenom.nom@ifri.edu" type="email" required>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1" for="reg-phone">Numéro de téléphone</label>
                <input class="w-full border border-outline-variant rounded px-4 py-2 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="reg-phone" placeholder="Ex: +229 01XXXXXXXX" type="tel" required>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1" for="reg-password">Mot de passe</label>
                <input class="w-full border border-outline-variant rounded px-4 py-2 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="reg-password" placeholder="••••••••" type="password" required>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1" for="reg-confirm-password">Confirmer le mot de passe</label>
                <input class="w-full border border-outline-variant rounded px-4 py-2 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="reg-confirm-password" placeholder="••••••••" type="password" required>
            </div>
            <button class="w-full bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-semibold py-3 rounded-lg transition-colors mt-6" type="submit">
                Suivant : Profil d'entraide
            </button>
        </form>
        <div class="mt-6 text-center text-sm text-on-surface-variant border-t border-outline-variant pt-6">
            Déjà un compte ? <a class="text-primary font-semibold hover:underline cursor-pointer" onclick="showView('view-login')">Se connecter</a>
        </div>
    </div>
</div>

<div class="view-container" id="view-profile">
    <div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-8 shadow-sm">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-primary mb-2">Profil d'entraide</h1>
            <p class="text-on-surface-variant">Complétez vos informations pour trouver les bons mentors ou mentorés.</p>
        </div>
        <form class="space-y-5" onsubmit="event.preventDefault(); alert('Profil créé avec succès ! Bienvenue sur MentorLink.');">
            
            <div>
                <label class="block text-sm font-medium mb-2">Votre Filière</label>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="filiere" value="GL" class="text-primary focus:ring-primary" checked>
                        <span>GL (Génie Logiciel)</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="filiere" value="IA" class="text-primary focus:ring-primary">
                        <span>IA (Intelligence Artificielle)</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="filiere" value="SI" class="text-primary focus:ring-primary">
                        <span>SI (Systèmes d'Information)</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="filiere" value="SEIoT" class="text-primary focus:ring-primary">
                        <span>SEIoT (Systèmes Embarqués & IoT)</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="radio" name="filiere" value="IM" class="text-primary focus:ring-primary">
                        <span>IM (Informatique Mobile)</span>
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1" for="matiere-forte">Matière forte (votre spécialité)</label>
                <input class="w-full border border-outline-variant rounded px-4 py-2 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm" id="matiere-forte" placeholder="Ex: Algorithmique, Analyse..." type="text" required>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1" for="matiere-faible">Matière faible (besoin d'aide)</label>
                <input class="w-full border border-outline-variant rounded px-4 py-2 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm" id="matiere-faible" placeholder="Ex: Probabilités, SQL, Électronique..." type="text" required>
            </div>

            <div class="flex gap-3 mt-6">
                <button type="button" onclick="showView('view-register')" class="w-1/3 bg-surface-container-low hover:bg-outline-variant text-on-surface font-semibold py-3 rounded-lg transition-colors border border-outline-variant">
                    Retour
                </button>
                <button class="w-2/3 bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-semibold py-3 rounded-lg transition-colors" type="submit">
                    Créer mon profil d'entraide
                </button>
            </div>
        </form>
    </div>
</div>

</div>

<script>
    function showView(viewId) {
        document.querySelectorAll('.view-container').forEach(el => {
            el.classList.remove('active');
        });
        document.getElementById(viewId).classList.add('active');
    }
</script>
</body></html>
