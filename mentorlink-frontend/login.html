<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>IFRI MentorLink - Welcome</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container": "#eceef0",
                    "on-surface": "#191c1e",
                    "on-secondary-fixed-variant": "#3f465c",
                    "on-tertiary-fixed-variant": "#005048",
                    "secondary-fixed": "#dae2fd",
                    "surface-container-highest": "#e0e3e5",
                    "on-primary-container": "#eeefff",
                    "secondary-container": "#dae2fd",
                    "tertiary-fixed": "#71f8e4",
                    "inverse-on-surface": "#eff1f3",
                    "secondary-fixed-dim": "#bec6e0",
                    "surface": "#f7f9fb",
                    "tertiary": "#006056",
                    "primary": "#004ac6",
                    "on-secondary-fixed": "#131b2e",
                    "on-primary-fixed-variant": "#003ea8",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-error-container": "#93000a",
                    "on-secondary": "#ffffff",
                    "surface-bright": "#f7f9fb",
                    "on-surface-variant": "#434655",
                    "background": "#f7f9fb",
                    "primary-fixed": "#dbe1ff",
                    "on-tertiary": "#ffffff",
                    "surface-tint": "#0053db",
                    "surface-dim": "#d8dadc",
                    "error": "#ba1a1a",
                    "tertiary-fixed-dim": "#4fdbc8",
                    "error-container": "#ffdad6",
                    "on-primary": "#ffffff",
                    "surface-container-high": "#e6e8ea",
                    "inverse-surface": "#2d3133",
                    "outline": "#737686",
                    "outline-variant": "#c3c6d7",
                    "tertiary-container": "#007b6e",
                    "secondary": "#565e74",
                    "on-tertiary-container": "#b1fff1",
                    "primary-container": "#2563eb",
                    "surface-container-low": "#f2f4f6",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed": "#00201c",
                    "on-background": "#191c1e",
                    "on-error": "#ffffff",
                    "inverse-primary": "#b4c5ff",
                    "surface-variant": "#e0e3e5",
                    "on-secondary-container": "#5c647a",
                    "on-primary-fixed": "#00174b"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "xl": "40px",
                    "gutter": "24px",
                    "base": "4px",
                    "md": "16px",
                    "container-max": "1280px",
                    "2xl": "64px",
                    "lg": "24px",
                    "xs": "4px",
                    "sm": "8px"
            },
            "fontFamily": {
                    "headline-xl": ["Inter"],
                    "headline-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "label-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "body-sm": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "headline-md": ["Inter"]
            },
            "fontSize": {
                    "headline-xl": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]
            }
          }
        }
      }
    </script>
<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        .view-container {
            display: none;
        }
        .view-container.active {
            display: block;
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-md bg-surface-container-low font-body-md text-on-surface">
<div class="w-full max-w-[480px]">

<div class="view-container active" id="view-login">
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-xl shadow-sm">
<div class="text-center mb-xl">
<img src="" alt="MentorLink Logo" class="w-[200px] mx-auto mb-sm">
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to continue your academic journey.</p>
</div>
<form class="space-y-md" onsubmit="event.preventDefault(); alert('Login submitted!');">
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="login-email">Email or Phone</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-md py-[10px] font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="login-email" placeholder="student@ifri.edu" type="text">
</div>
<div>
<div class="flex justify-between items-center mb-xs">
<label class="block font-label-sm text-label-sm text-on-surface" for="login-password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-md py-[10px] font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="login-password" placeholder="••••••••" type="password">
</div>
<div class="flex items-center">
<input class="rounded-sm border-outline-variant text-primary focus:ring-primary h-4 w-4" id="remember-me" type="checkbox">
<label class="ml-sm font-body-sm text-body-sm text-on-surface-variant" for="remember-me">Remember me</label>
</div>
<button class="w-full bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-label-md text-label-md py-[12px] rounded-lg transition-colors mt-lg" type="submit">
                        Sign In
                    </button>
</form>
<div class="mt-lg text-center font-body-sm text-body-sm text-on-surface-variant border-t border-outline-variant pt-lg">
                    New to MentorLink? <a class="text-primary font-label-md hover:underline cursor-pointer" onclick="showView('view-register')">Create an account</a>
</div>
</div>
</div>

<div class="view-container" id="view-register">
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-xl shadow-sm">
<div class="text-center mb-lg">
<h1 class="font-headline-md text-headline-md text-primary mb-sm">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Join the IFRI mentorship community.</p>
</div>
<form class="space-y-md" onsubmit="event.preventDefault(); alert('Registration submitted!');">
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="reg-name">Full Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-md py-[10px] font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="reg-name" placeholder="Jane Doe" type="text">
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="reg-email">University Email</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-md py-[10px] font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="reg-email" placeholder="jane.doe@ifri.edu" type="email">
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="reg-phone">Phone Number</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-md py-[10px] font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="reg-phone" placeholder="+1 (555) 000-0000" type="tel">
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="reg-password">Password</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-md py-[10px] font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="reg-password" placeholder="••••••••" type="password">
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="reg-confirm">Confirm Password</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-md py-[10px] font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="reg-confirm" placeholder="••••••••" type="password">
</div>
<button class="w-full bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-label-md text-label-md py-[12px] rounded-lg transition-colors mt-lg" type="submit">
                        Register
                    </button>
</form>
<div class="mt-lg text-center font-body-sm text-body-sm text-on-surface-variant border-t border-outline-variant pt-lg">
                    Already have an account? <a class="text-primary font-label-md hover:underline cursor-pointer" onclick="showView('view-login')">Sign in</a>
</div>
</div>
</div>

</div>
<script>
        function showView(viewId) {
            document.querySelectorAll('.view-container').forEach(el => {
                el.classList.remove('active');
            });
            document.getElementById(viewId).classList.add('active');
        }
    </script>
</body></html>
