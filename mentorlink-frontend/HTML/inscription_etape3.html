<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>MentorLink - Votre Profil Académique</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
     <link rel="stylesheet" href="css/global.css">
       <link rel="stylesheet" href="css/etape3.css">
    <script src="js/config.js"></script>
    <script src="js/etape3.js"></script>
    <style>
        /* Styles modernes pour le système de badges dynamiques */
        .select-matiere {
            margin-top: 8px;
            background-color: #ffffff;
            border: 1px solid #ced4da;
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
            width: 100%;
        }
        .box-selection {
            background: #f8f9fa;
            border: 1px dashed #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            min-height: 60px;
        }
        .box-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .badge-stored {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 20px;
            margin: 4px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .badge-fort {
            background-color: #ebfbee;
            color: #2b8a3e;
            border: 1px solid #d3f9d8;
        }
        .badge-fort:hover {
            background-color: #ffe3e3;
            color: #c92a2a;
            border-color: #ffe3e3;
        }
        .badge-faible {
            background-color: #fff5f5;
            color: #c92a2a;
            border: 1px solid #ffe3e3;
        }
        .badge-faible:hover {
            background-color: #ffe3e3;
            color: #c92a2a;
            border-color: #ffe3e3;
        }
        .placeholder-zone {
            color: #adb5bd;
            font-size: 13px;
            font-style: italic;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container" style="max-width: 620px;">
        <div class="logo-container">
            <img src="IFRI.png" alt="Logo IFRI MentorLink" style="max-height: 70px; width: auto; object-fit: contain;">
        </div>

        <div class="card">
            <div class="progress-bar-container">
                <div class="progress-segment active"></div>
                <div class="progress-segment active"></div>
                <div class="progress-segment active"></div>
            </div>

            <div class="card-body" style="padding-top: 24px;">
                <div class="step-header-top">
                    <span class="step-label">Étape 3 sur 3</span>
                    <span class="step-status">Finalisation</span>
                </div>
                
                <h1 class="title" style="text-align: left; margin-top: 16px;">Votre Profil Académique</h1>
                <p class="subtitle" style="text-align: left; margin-bottom: 24px;">
                    Détaillez votre parcours actuel pour charger vos cours officiels de l'IFRI.
                </p>

               <form id="academicForm">
    
    <div class="form-row-grid">
        <div class="form-group">
            <label for="study-level">Niveau d'études</label>
            <select class="form-control select-custom" id="study-level" required>
                <option value="" disabled selected>Niveau</option>
                <option value="L1">Licence 1</option>
                <option value="L2">Licence 2</option>
                <option value="L3">Licence 3</option>
            </select>
        </div>

        <div class="form-group">
            <label for="filiere">Filière</label>
            <select class="form-control select-custom" id="filiere" required>
                <option value="" disabled selected>Filière</option>
                <option value="GL">Génie Logiciel (GL)</option>
                <option value="SI">Sécurité Informatique (SI)</option>
                <option value="IM">Internet et Multimédia (IM)</option>
                <option value="SIRI">Systèmes d'Info & Réseaux</option>
                <option value="IA">Intelligence Artificielle (IA)</option>
                <option value="IoT">Systèmes Embarqués & IoT</option>
            </select>
        </div>
    </div>

    <div class="form-group" style="margin-top: 20px;">
        
        <div style="margin-bottom: 20px;">
            <label class="box-title"> Vos Points Forts (Matières à partager)</label>
            <select id="select-forts" class="select-matiere" disabled>
                <option value="" disabled selected>Choisissez une matière à ajouter...</option>
            </select>
            <div class="box-selection" id="zone-forts">
                <p class="placeholder-zone">Aucune matière sélectionnée comme point fort.</p>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <label class="box-title"> Vos Points Faibles (Matières à améliorer)</label>
            <select id="select-faibles" class="select-matiere" disabled>
                <option value="" disabled selected>Choisissez une matière à ajouter...</option>
            </select>
            <div class="box-selection" id="zone-faibles">
                <p class="placeholder-zone">Aucune matière sélectionnée comme point faible.</p>
            </div>
        </div>

    </div>

    <div class="form-group" style="margin-top: 24px;">
        <label for="bio">Courte biographie <span style="color: var(--text-muted); font-weight: 400;">(Facultative)</span></label>
        <textarea class="form-control textarea-custom" id="bio" rows="4" placeholder="Ex: Étudiant passionné cherchant à s'améliorer en développement web..."></textarea>
    </div>

    <button class="btn-primary" type="submit" style="margin-top: 24px;">Terminer l'inscription →</button>
</form>

                <div style="text-align: center; margin-top: 20px;">
                    <a href="inscription_etape2.html" class="btn-back">Retour à l'étape précédente</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
