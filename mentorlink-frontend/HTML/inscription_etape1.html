<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>MentorLink - Création de compte</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
     <link rel="stylesheet" href="css/global.css">
    <script src="js/etape1.js"></script>
</head>
<body>

    <div class="container">
       <div class="logo-container">
    <img src="IFRI.png" alt="Logo IFRI MentorLink" class="logo-img">
    <h2 class="logo-title">Rejoignez MentorLink</h2>
    <p class="logo-subtitle">Commencez votre parcours de développement professionnel.</p>
</div>

        <div class="card">
            <div style="width: 100%; height: 4px; background-color: var(--primary-light);">
                <div style="width: 33%; height: 100%; background-color: var(--primary-color);"></div>
            </div>

            <div class="card-body" style="padding-top: 24px;">
                <span style="display: inline-block; background: var(--primary-light); color: var(--primary-color); font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 4px; border-radius: 4px; margin-bottom: 12px;">Étape 1 sur 3</span>
                
                <h1 class="title" style="text-align: left; margin-bottom: 24px; font-size: 20px;">Création de compte</h1>

                <form action="inscription_etape2.html" method="GET" id="registerForm">
                    <div class="form-group">
                        <label for="firstname">Prénom</label>
                        <div class="input-wrapper">
                            <span class="input-icon"></span>
                            <input class="form-control" id="firstname" placeholder="Votre prénom" type="text" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="lastname">Nom</label>
                        <div class="input-wrapper">
                            <span class="input-icon"></span>
                            <input class="form-control" id="lastname" placeholder="Votre nom" type="text" required>
                        </div>
                    </div>

                                       <div class="form-group">
                        <label for="email">Adresse e-mail</label>
                        <div class="input-wrapper">
                            <span class="input-icon">✉</span>
                            <input class="form-control" id="email" placeholder="nom@exemple.com" type="email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="telephone">Numéro de téléphone</label>
                        <div class="input-wrapper">
                            <span class="input-icon"></span>
                            <input class="form-control" id="telephone" placeholder="Ex : 01020304" type="tel" required>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 6px;">
                        <label for="reg-password">Mot de passe</label>
                        <div class="input-wrapper">
                            <span class="input-icon"></span>
                            <input class="form-control" id="reg-password" placeholder="Créez un mot de passe sécurisé" type="password" required>
                        </div>
                    </div>
                    <p style="font-size: 11px; color: var(--text-muted); margin-bottom: 20px;">Au moins 8 caractères, dont un chiffre et un symbole.</p>

                    <div class="form-group">
                        <label for="confirm-password">Confirmer le mot de passe</label>
                        <div class="input-wrapper">
                            <span class="input-icon"></span>
                            <input class="form-control" id="confirm-password" placeholder="Répétez votre mot de passe" type="password" required>
                        </div>
                    </div>

                    <button class="btn-primary" type="submit" style="margin-top: 24px;">Suivant →</button>
                </form>
            </div>

            <div class="card-footer-bar">
                Déjà membre ? <a href="connexion.html">Se connecter</a>
            </div>
        </div>

        <div class="external-footer">
            <a href="#" style="color: var(--text-muted); text-decoration: none;">Aide</a>
            <a href="#" style="color: var(--text-muted); text-decoration: none;">Confidentialité</a>
            <a href="#" style="color: var(--text-muted); text-decoration: none;">Conditions</a>
        </div>
    </div>

</body>
</html>
