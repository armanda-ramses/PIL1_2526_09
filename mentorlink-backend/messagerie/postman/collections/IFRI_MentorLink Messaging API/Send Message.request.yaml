$kind: http-request
name: Send Message
url: "{{baseUrl}}/api/messages/"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: '{"conversation_id": {{conversation_id}}, "expediteur_id": {{user1_id}}, "contenu_message": "{{message_text}}"}'
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 201', function () {
        pm.response.to.have.status(201);
      });
      var jsonData = pm.response.json();
      pm.test('Message saved with content', function () {
        pm.expect(jsonData.contenu_message).to.eql(pm.collectionVariables.get('message_text'));
      });
    language: text/javascript
order: 4000
